<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>買い物最適化</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:5px;
font-size:18px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

li{
list-style:none;
background:#eee;
margin:5px;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

.delete{
background:red;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>商品追加</h2>

<input type="text" id="product" placeholder="商品名">

<input type="number" id="price" placeholder="値段">

<input type="number" id="limit" placeholder="最大個数">

<br>

<label>
<input type="checkbox" id="required">
必ず買う
</label>

<br>

<button onclick="addItem()">追加</button>

<ul id="list"></ul>

<h3>目標金額</h3>

<input type="number" id="target" placeholder="目標金額">

<br>

<button onclick="findBest()">最適組み合わせ</button>

<h3>結果</h3>

<div id="result"></div>

</div>

<script>

let items=[];

function addItem(){

let name=document.getElementById("product").value;
let price=Number(document.getElementById("price").value);
let limit=Number(document.getElementById("limit").value);
let required=document.getElementById("required").checked;

items.push({name,price,limit,required});

displayItems();

document.getElementById("product").value="";
document.getElementById("price").value="";
document.getElementById("limit").value="";
document.getElementById("required").checked=false;

}

function displayItems(){

let list=document.getElementById("list");
list.innerHTML="";

items.forEach((item,index)=>{

let requiredText=item.required ? "★必須" : "";

let li=document.createElement("li");

li.innerHTML=
item.name+" "+item.price+"円 (最大"+item.limit+"個) "+requiredText+
" <button class='delete' onclick='deleteItem("+index+")'>削除</button>";

list.appendChild(li);

});

}

function deleteItem(index){

items.splice(index,1);
displayItems();

}

function findBest(){

let target=Number(document.getElementById("target").value);

let bestSum=Infinity;
let bestCombos=[];

function search(index,sum,combo){

if(index>=items.length){

if(sum>=target){

if(sum<bestSum){

bestSum=sum;
bestCombos=[{...combo}];

}
else if(sum===bestSum){

bestCombos.push({...combo});

}

}

return;

}

let item=items[index];

let start=0;
if(item.required) start=1;

for(let count=start;count<=item.limit;count++){

let newSum=sum+item.price*count;

let newCombo={...combo};

if(count>0){
newCombo[item.name]=count;
}

search(index+1,newSum,newCombo);

}

}

search(0,0,{});

if(bestCombos.length===0){

document.getElementById("result").innerHTML="見つかりません";
return;

}

let text="おすすめ組み合わせ<br><br>";

bestCombos.forEach((combo,i)=>{

text+="パターン"+(i+1)+"<br>";

for(let name in combo){

text+=name+" × "+combo[name]+"<br>";

}

text+="<br>";

});

text+="合計 "+bestSum+" 円";

document.getElementById("result").innerHTML=text;

}

</script>

</body>
</html>
