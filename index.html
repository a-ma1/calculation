<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>買い物最適化</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#eef2f7;
padding:20px;
}

.container{
background:white;
max-width:420px;
margin:auto;
padding:20px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2d7ef7;
color:white;
font-size:16px;
}

ul{
padding:0;
}

li{
list-style:none;
background:#f4f6fa;
margin:5px 0;
padding:8px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

.delete{
background:#e74c3c;
padding:3px 8px;
border-radius:6px;
color:white;
border:none;
}

.result{
background:#f0f4ff;
padding:10px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h3>商品追加</h3>

<input id="product" placeholder="商品名">
<input id="price" type="number" placeholder="値段">
<input id="required" type="number" placeholder="必須数">
<input id="max" type="number" placeholder="最大個数">

<button onclick="addItem()">追加</button>

<ul id="list"></ul>

<h3>目標金額</h3>

<input id="target" type="number">

<button onclick="findBest()">組み合わせ計算</button>

<div id="result"></div>

</div>

<script>

let items=[];

function addItem(){

let name=document.getElementById("product").value;
let price=Number(document.getElementById("price").value);
let required=Number(document.getElementById("required").value);
let max=Number(document.getElementById("max").value);

items.push({name,price,required,max});

displayItems();

}

function displayItems(){

let list=document.getElementById("list");
list.innerHTML="";

items.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=
item.name+" "+item.price+"円 (必須"+item.required+" 最大"+item.max+")"+
" <button class='delete' onclick='deleteItem("+index+")'>削除</button>";

list.appendChild(li);

});

}

function deleteItem(index){

items.splice(index,1);

displayItems();

}

function findBest(){

let target=Number(document.getElementById("target").value);

let maxSearch=target+500;

let LIMIT=200;

let dp=new Array(maxSearch+1).fill(null);

dp[0]=[{}];

items.forEach(item=>{

let next=[...dp];

for(let sum=0;sum<=maxSearch;sum++){

if(dp[sum]){

dp[sum].forEach(combo=>{

for(let c=item.required;c<=item.max;c++){

let newSum=sum+item.price*c;

if(newSum>maxSearch) break;

let newCombo={...combo};

if(c>0){

newCombo[item.name]=(newCombo[item.name]||0)+c;

}

if(!next[newSum]){

next[newSum]=[];

}

if(next[newSum].length<LIMIT){

next[newSum].push(newCombo);

}

}

});

}

}

dp=next;

});

let bestSum=null;

for(let i=target;i<=maxSearch;i++){

if(dp[i]){

bestSum=i;
break;

}

}

if(bestSum==null){

document.getElementById("result").innerHTML="見つかりません";
return;

}

let html="<b>合計 "+bestSum+"円</b>";

dp[bestSum].forEach((combo,i)=>{

html+="<div class='result'>";

html+="パターン"+(i+1)+"<br>";

for(let name in combo){

html+=name+" × "+combo[name]+"<br>";

}

html+="</div>";

});

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
