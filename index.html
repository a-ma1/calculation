<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>組み合わせ計算</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:30px;
}

.container{
background:white;
max-width:450px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.add{
background:#27ae60;
color:white;
}

.calc{
background:#3498db;
color:white;
}

.delete{
background:#e74c3c;
color:white;
padding:4px 10px;
border-radius:8px;
border:none;
}

li{
list-style:none;
background:#f5f6fa;
margin:6px 0;
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.result{
background:#f1f4ff;
padding:10px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>🛒 組み合わせ計算</h2>

<input id="product" placeholder="商品名">

<input id="price" type="number" placeholder="値段">

<input id="required" type="number" placeholder="必須数">

<input id="max" type="number" placeholder="最大数 (未入力なら100)">

<button class="add" onclick="addItem()">商品追加</button>

<ul id="list"></ul>

<h3>目標金額</h3>

<input id="target" type="number">

<button class="calc" onclick="findBest()">組み合わせ計算</button>

<div id="result"></div>

</div>

<script>

let items=[];

function addItem(){

let name=document.getElementById("product").value;

let price=Number(document.getElementById("price").value);

let required=Number(document.getElementById("required").value);

let maxInput=document.getElementById("max").value;

let max=maxInput===""?100:Number(maxInput);

items.push({name,price,required,max});

displayItems();

}

function displayItems(){

let list=document.getElementById("list");

list.innerHTML="";

items.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=
item.name+" "+item.price+"円 (必須"+item.required+" 最大"+item.max+")"+
" <button class='delete' onclick='deleteItem("+index+")'>削除</button>";

list.appendChild(li);

});

}

function deleteItem(index){

items.splice(index,1);

displayItems();

}

function comboKey(combo){

let keys=Object.keys(combo).sort();

return keys.map(k=>k+combo[k]).join("_");

}

function findBest(){

let target=Number(document.getElementById("target").value);

let maxSearch=target+500;

let LIMIT=200;

let dp=new Array(maxSearch+1).fill(null);

dp[0]=[{}];

let seen=new Set();

items.forEach(item=>{

let next=[...dp];

for(let sum=0;sum<=maxSearch;sum++){

if(dp[sum]){

dp[sum].forEach(combo=>{

for(let c=item.required;c<=item.max;c++){

let newSum=sum+item.price*c;

if(newSum>maxSearch) break;

let newCombo={...combo};

if(c>0){

newCombo[item.name]=(newCombo[item.name]||0)+c;

}

let key=comboKey(newCombo);

if(seen.has(key)) continue;

seen.add(key);

if(!next[newSum]) next[newSum]=[];

if(next[newSum].length<LIMIT){

next[newSum].push(newCombo);

}

}

});

}

}

dp=next;

});

let bestSum=null;

for(let i=target;i<=maxSearch;i++){

if(dp[i]){

bestSum=i;
break;

}

}

if(bestSum==null){

document.getElementById("result").innerHTML="見つかりません";

return;

}

let html="<h3>合計 "+bestSum+"円</h3>";

dp[bestSum].forEach((combo,i)=>{

html+="<div class='result'>";

html+="パターン"+(i+1)+"<br>";

for(let name in combo){

html+=name+" × "+combo[name]+"<br>";

}

html+="</div>";

});

document.getElementById("result").innerHTML=html;

}

</script>

</body>

</html>
