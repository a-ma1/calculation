<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>買い物最適化</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(135deg,#6dd5fa,#2980b9);
margin:0;
padding:20px;
}

.container{
background:white;
border-radius:20px;
padding:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2,h3{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.add{
background:#27ae60;
color:white;
}

.calc{
background:#2980b9;
color:white;
}

.delete{
background:#e74c3c;
color:white;
border:none;
border-radius:8px;
padding:5px 10px;
}

ul{
padding:0;
}

li{
list-style:none;
background:#f5f6fa;
margin:6px 0;
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.resultCard{
background:#ecf0f1;
padding:10px;
border-radius:10px;
margin:10px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>🛒 商品追加</h2>

<input id="product" placeholder="商品名">

<input id="price" type="number" placeholder="値段">

<input id="required" type="number" placeholder="必須数">

<input id="max" type="number" placeholder="最大個数">

<button class="add" onclick="addItem()">商品追加</button>

<ul id="list"></ul>

<h3>🎯 目標金額</h3>

<input id="target" type="number" placeholder="目標金額">

<button class="calc" onclick="findBest()">組み合わせ計算</button>

<h3>結果</h3>

<div id="result"></div>

</div>

<script>

let items=[];

function addItem(){

let name=document.getElementById("product").value;
let price=Number(document.getElementById("price").value);
let required=Number(document.getElementById("required").value);
let max=Number(document.getElementById("max").value);

items.push({name,price,required,max});

displayItems();

}

function displayItems(){

let list=document.getElementById("list");

list.innerHTML="";

items.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=

item.name+" "+item.price+"円 (必須"+item.required+" 最大"+item.max+")"

+" <button class='delete' onclick='deleteItem("+index+")'>削除</button>";

list.appendChild(li);

});

}

function deleteItem(index){

items.splice(index,1);

displayItems();

}

function findBest(){

let target=Number(document.getElementById("target").value);

let maxSearch=target+1000;

let dp=new Array(maxSearch+1).fill(null);

dp[0]=[{}];

items.forEach(item=>{

let next=[...dp];

for(let sum=0;sum<=maxSearch;sum++){

if(dp[sum]!=null){

dp[sum].forEach(combo=>{

for(let c=item.required;c<=item.max;c++){

let newSum=sum+item.price*c;

if(newSum>maxSearch) break;

let newCombo={...combo};

if(c>0){

newCombo[item.name]=(newCombo[item.name]||0)+c;

}

if(next[newSum]==null){

next[newSum]=[newCombo];

}else{

next[newSum].push(newCombo);

}

}

});

}

}

dp=next;

});

let bestSum=null;

for(let i=target;i<=maxSearch;i++){

if(dp[i]!=null){

bestSum=i;

break;

}

}

if(bestSum==null){

document.getElementById("result").innerHTML="見つかりません";

return;

}

let combos=dp[bestSum];

let html="";

combos.forEach((combo,i)=>{

html+="<div class='resultCard'>";

html+="<b>パターン"+(i+1)+"</b><br>";

for(let name in combo){

html+=name+" × "+combo[name]+"<br>";

}

html+="</div>";

});

html+="<b>合計 "+bestSum+" 円</b>";

document.getElementById("result").innerHTML=html;

}

</script>

</body>

</html>
