<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>高速買い物最適化</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:5px;
font-size:18px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

li{
list-style:none;
background:#eee;
margin:5px;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>商品追加</h2>

<input id="product" placeholder="商品名">
<input id="price" type="number" placeholder="値段">
<input id="min" type="number" placeholder="最小個数">
<input id="max" type="number" placeholder="最大個数">

<br>

<button onclick="addItem()">追加</button>

<ul id="list"></ul>

<h3>目標金額</h3>

<input id="target" type="number" placeholder="目標金額">

<br>

<button onclick="findBest()">最適組み合わせ</button>

<h3>結果</h3>

<div id="result"></div>

</div>

<script>

let items=[];

function addItem(){

let name=document.getElementById("product").value;
let price=Number(document.getElementById("price").value);
let min=Number(document.getElementById("min").value);
let max=Number(document.getElementById("max").value);

items.push({name,price,min,max});

displayItems();

}

function displayItems(){

let list=document.getElementById("list");
list.innerHTML="";

items.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=
item.name+" "+item.price+"円 (最小"+item.min+" 最大"+item.max+")"+
" <button class='delete' onclick='deleteItem("+index+")'>削除</button>";

list.appendChild(li);

});

}

function deleteItem(index){

items.splice(index,1);
displayItems();

}

function findBest(){

let target=Number(document.getElementById("target").value);

let maxSearch=target+1000;

let dp=new Array(maxSearch+1).fill(null);

dp[0]=[{}];

items.forEach(item=>{

let next=[...dp];

for(let sum=0;sum<=maxSearch;sum++){

if(dp[sum]!=null){

dp[sum].forEach(combo=>{

for(let c=item.min;c<=item.max;c++){

let newSum=sum+item.price*c;

if(newSum>maxSearch) break;

let newCombo={...combo};

if(c>0){

newCombo[item.name]=(newCombo[item.name]||0)+c;

}

if(next[newSum]==null){

next[newSum]=[newCombo];

}
else{

next[newSum].push(newCombo);

}

}

});

}

}

dp=next;

});

let bestSum=null;

for(let i=target;i<=maxSearch;i++){

if(dp[i]!=null){

bestSum=i;
break;

}

}

if(bestSum==null){

document.getElementById("result").innerHTML="見つかりません";
return;

}

let combos=dp[bestSum];

let text="おすすめ組み合わせ<br><br>";

combos.forEach((combo,i)=>{

text+="パターン"+(i+1)+"<br>";

for(let name in combo){

text+=name+" × "+combo[name]+"<br>";

}

text+="<br>";

});

text+="合計 "+bestSum+" 円";

document.getElementById("result").innerHTML=text;

}

</script>

</body>
</html>
