<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>買い物計算アプリ</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:5px;
font-size:18px;
}

button{
padding:10px;
font-size:18px;
margin:5px;
}

ul{
text-align:left;
}

</style>
</head>

<body>

<div class="container">

<h2>買い物メモ</h2>

<input type="text" id="product" placeholder="商品名">

<input type="number" id="price" placeholder="値段">

<br>

<button onclick="addItem()">追加</button>

<h3>商品リスト</h3>

<ul id="list"></ul>

<h3>合計</h3>

<p id="total">0 円</p>

</div>

<script>

let total = 0;

function addItem(){

let product = document.getElementById("product").value;

let price = Number(document.getElementById("price").value);

let li = document.createElement("li");

li.textContent = product + " : " + price + "円";

document.getElementById("list").appendChild(li);

total = total + price;

document.getElementById("total").textContent = total + " 円";

document.getElementById("product").value = "";

document.getElementById("price").value = "";

}

</script>

</body>
</html>
